<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Railway Trips{% endblock %} – UMBB DSS</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1a2e;
      --cream:  #f5f0e8;
      --gold:   #e5b555;
      --blue:   #0f3460;
      --white:  #ffffff;
      --red:    #c0392b;
      --green:  #27ae60;
      --teal:   #2980b9;
      --border: #e8e3d8;
      --shadow: 0 4px 24px rgba(26,26,46,.09);
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--ink);
      color: rgba(245,240,232,.65);
      font-size: .75rem;
      letter-spacing: .1em;
      padding: 8px 36px;
      display: flex;
      justify-content: space-between;
    }

    /* ── NAV ── */
    nav {
      background: var(--blue);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    nav .brand {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.1rem;
      padding: 14px 0;
      margin-right: auto;
      text-decoration: none;
      letter-spacing: .03em;
    }
    nav a {
      color: rgba(245,240,232,.75);
      text-decoration: none;
      padding: 18px 16px;
      font-size: .85rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: color .2s, background .2s;
    }
    nav a:hover, nav a.active {
      color: var(--gold);
      background: rgba(255,255,255,.06);
    }

    /* ── PAGE HERO ── */
    .page-hero {
      background: linear-gradient(135deg, var(--ink) 0%, var(--blue) 100%);
      color: var(--cream);
      padding: 44px 36px 36px;
      position: relative;
      overflow: hidden;
    }
    .page-hero::after {
      content: "🚆";
      position: absolute; right: -10px; top: -20px;
      font-size: 160px; opacity: .04;
    }
    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 6px;
    }
    .page-hero p { opacity: .6; font-size: .92rem; letter-spacing: .05em; }

    /* ── MAIN CONTENT ── */
    .container { max-width: 1060px; margin: 0 auto; padding: 36px 20px; flex: 1; }

    /* ── CARDS ── */
    .card {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 28px;
    }
    .card-header {
      background: linear-gradient(90deg, var(--ink) 0%, var(--blue) 100%);
      color: var(--cream);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .badge {
      background: var(--gold);
      color: var(--ink);
      font-weight: 700;
      font-size: .75rem;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .07em;
    }
    .card-body { padding: 24px; }

    /* ── TABLES ── */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead tr { background: var(--ink); color: var(--cream); }
    thead th { padding: 11px 14px; text-align: center; font-size: .78rem; letter-spacing: .07em; text-transform: uppercase; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: #faf7f2; }
    tbody td { padding: 10px 14px; text-align: center; }
    tbody tr:hover { background: #f0ead8; }

    .vip   { color: var(--red);  font-weight: 700; }
    .first { color: var(--teal); font-weight: 600; }
    .eco   { color: var(--green); }
    .fw6   { font-weight: 600; }

    /* ── FILTERS FORM ── */
    .filter-form {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 32px;
    }
    .filter-form h3 {
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 16px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      align-items: end;
    }
    .filter-grid label { font-size: .8rem; color: #666; display: block; margin-bottom: 5px; letter-spacing: .05em; }
    .filter-grid input,
    .filter-grid select {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .88rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      background: #fdfcfa;
    }
    .filter-grid input:focus,
    .filter-grid select:focus { border-color: var(--gold); }
    .btn {
      padding: 9px 22px;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: .88rem;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: .04em;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary { background: var(--ink); color: var(--cream); }
    .btn-gold    { background: var(--gold); color: var(--ink); }
    .btn-sm      { padding: 6px 14px; font-size: .8rem; }

    /* ── STATS GRID ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-box { background: var(--white); border-radius: 10px; padding: 18px 16px; text-align: center; box-shadow: var(--shadow); }
    .stat-box .val { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--blue); }
    .stat-box .lbl { font-size: .75rem; color: #999; letter-spacing: .08em; text-transform: uppercase; margin-top: 4px; }

    /* ── PILL TAGS ── */
    .pill { display:inline-block; padding: 2px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
    .pill-normal  { background:#e8f4fd; color:#2980b9; }
    .pill-rapid   { background:#fdecea; color:#c0392b; }
    .pill-coradia { background:#eafbea; color:#27ae60; }

    /* ── ALERTS ── */
    .alert { padding: 14px 20px; border-radius: 9px; margin-bottom: 20px; font-size: .9rem; }
    .alert-info    { background: #e8f4fd; border-left: 4px solid var(--teal); color: #1a5c80; }
    .alert-warning { background: #fef9ec; border-left: 4px solid var(--gold); color: #7a5c0a; }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 22px;
      font-size: .75rem; color: #aaa; letter-spacing: .07em;
      border-top: 1px solid var(--border);
    }

    a.detail-link {
      color: var(--blue); font-weight: 600; text-decoration: none;
      font-size: .8rem; letter-spacing: .04em;
    }
    a.detail-link:hover { color: var(--gold); }

    .no-results { text-align: center; padding: 40px 20px; color: #aaa; font-size: .95rem; }

    /* ── TRIP DETAIL ── */
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; margin-bottom: 28px; }
    .detail-box { background: var(--cream); border-radius: 9px; padding: 16px 18px; }
    .detail-box .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: #999; margin-bottom: 4px; }
    .detail-box .value { font-size: 1.1rem; font-weight: 700; color: var(--ink); }
  </style>
</head>
<body>
  <div class="topbar">
    <span>UMBB – FS · CS Department</span>
    <span>Module: L3 – DSS · 2025/2026</span>
  </div>

  <nav>
    <a href="/" class="brand">🚆 RailwayDSS</a>
    <a href="/" {% if request.path == '/' and not request.args %}class="active"{% endif %}>Home</a>
    <a href="/search" {% if request.path == '/search' %}class="active"{% endif %}>Search & Filter</a>
    <a href="/statistics" {% if request.path == '/statistics' %}class="active"{% endif %}>Statistics</a>
  </nav>

  {% block content %}{% endblock %}

  <footer>
    Railway Trip Management · UMBB CS Department · L3-DSS 2025/2026
  </footer>
</body>
</html>
