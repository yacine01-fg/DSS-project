<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Railway Trips{% endblock %} – RailwayDSS</title>
  <meta name="description" content="Railway Trip Management System – UMBB FS CS Department L3 DSS 2025/2026"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    hsl(230, 40%, 4%);
      --bg-card:    hsla(0, 0%, 100%, 0.03);
      --bg-card-hover: hsla(0, 0%, 100%, 0.06);
      --border:     hsla(0, 0%, 100%, 0.08);
      --border-hover: hsla(0, 0%, 100%, 0.15);
      
      --accent-hsl: 245, 82%, 67%;
      --accent:     hsl(var(--accent-hsl));
      --accent-glow: hsla(var(--accent-hsl), 0.3);
      
      --accent2-hsl: 265, 90%, 65%;
      --accent2:    hsl(var(--accent2-hsl));
      
      --gold:       #fbbf24;
      --green:      #10b981;
      --red:        #f43f5e;
      --text:       #f8fafc;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      
      --radius:     16px;
      --radius-sm:  10px;
      --shadow-lg:  0 20px 50px rgba(0,0,0,0.5);
      --glass-blur: blur(16px);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 0% 0%, hsla(245, 82%, 67%, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, hsla(265, 90%, 65%, 0.1) 0%, transparent 40%);
    }

    h1, h2, h3, .brand, .hero-eyebrow, .card-title, .stat-box .val, .detail-box .value {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ────────── TOPBAR ────────── */
    .topbar {
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      color: var(--text-faint);
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 10px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    .topbar .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 8px;
      box-shadow: 0 0 10px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform: scale(1); } 50% { opacity:.4; transform: scale(0.8); }
    }

    /* ────────── NAV ────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: hsla(230, 40%, 4%, 0.8);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 40px;
      transition: all 0.3s ease;
    }
    nav .brand {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 0;
      letter-spacing: -.02em;
    }
    nav .brand .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    nav .brand span.sub {
      font-size: .65rem;
      font-weight: 500;
      color: var(--text-faint);
      letter-spacing: .05em;
      display: block;
      margin-top: -2px;
      text-transform: uppercase;
    }
    nav a:not(.brand) {
      color: var(--text-muted);
      text-decoration: none;
      padding: 24px 16px;
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .02em;
      position: relative;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    nav a:not(.brand)::after {
      content: '';
      position: absolute;
      bottom: 0; left: 16px; right: 16px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px 3px 0 0;
      transform: scaleX(0);
      transition: transform .3s ease;
    }
    nav a:not(.brand):hover { color: var(--text); background: rgba(255,255,255,0.03); }
    nav a:not(.brand).active { color: var(--text); }
    nav a:not(.brand).active::after { transform: scaleX(1); }

    /* ────────── PAGE HERO ────────── */
    .page-hero {
      padding: 80px 40px 60px;
      position: relative;
      text-align: center;
    }
    .hero-eyebrow {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: '';
      width: 30px; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--accent));
    }
    .hero-eyebrow::after { background: linear-gradient(-90deg, transparent, var(--accent)); }

    .page-hero h1 {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: 1.1;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .page-hero p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .hero-decoration {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 180px;
      opacity: .03;
      user-select: none;
      pointer-events: none;
      z-index: -1;
    }

    /* ────────── CONTAINER ────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 60px;
      flex: 1;
      width: 100%;
    }

    /* ────────── GLASS CARDS ────────── */
    .card {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 30px;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .card-header {
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .card-body { padding: 28px; }

    /* ────────── BADGE ────────── */
    .badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 700;
      font-size: .65rem;
      padding: 4px 12px;
      border-radius: 30px;
      letter-spacing: .1em;
      text-transform: uppercase;
      box-shadow: 0 4px 10px var(--accent-glow);
    }
    .badge-gold {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 4px 10px rgba(245, 158, 11, 0.2);
    }

    /* ────────── TABLES ────────── */
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    thead tr {
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }
    thead th {
      padding: 16px 20px;
      text-align: center;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: all .2s ease;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody td {
      padding: 18px 20px;
      text-align: center;
      color: var(--text);
    }
    tbody tr:hover { background: rgba(255,255,255,0.04); }

    /* ────────── PILLS ────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .pill::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
    .pill-normal  { background: rgba(6,182,212,0.1);  color: #22d3ee; border: 1px solid rgba(6,182,212,0.2); }
    .pill-rapid   { background: rgba(244,63,94,0.1);  color: #fb7185; border: 1px solid rgba(244,63,94,0.2); }
    .pill-coradia { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }

    /* ────────── CLASS LABELS ────────── */
    .vip   { color: #fb7185; font-weight: 800; }
    .first { color: #38bdf8; font-weight: 700; }
    .eco   { color: #34d399; font-weight: 600; }

    /* ────────── FILTER FORM ────────── */
    .filter-form {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 40px;
      box-shadow: var(--shadow-lg);
    }
    .filter-form-title {
      font-size: .8rem;
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      align-items: end;
    }
    .filter-grid label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-faint);
      display: block;
      margin-bottom: 10px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .filter-grid input,
    .filter-grid select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: all .2s ease;
    }
    .filter-grid input:focus,
    .filter-grid select:focus {
      border-color: var(--accent);
      background: rgba(0,0,0,0.3);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    .filter-grid select option { background: #0f172a; color: var(--text); }

    /* ────────── BUTTONS ────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-3px); }
    .btn:active { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 8px 20px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 12px 25px var(--accent-glow); }
    .btn-ghost {
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: var(--border-hover); }

    /* ────────── STAT BOXES ────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      transition: all .3s ease;
      position: relative;
      overflow: hidden;
    }
    .stat-box:hover {
      border-color: var(--accent);
      transform: translateY(-5px);
      background: var(--bg-card-hover);
    }
    .stat-box .val {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }
    .stat-box .lbl {
      font-size: .7rem;
      color: var(--text-faint);
      letter-spacing: .15em;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* ────────── DETAIL GRID ────────── */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .detail-box {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 24px;
      transition: all .3s ease;
    }
    .detail-box:hover { border-color: var(--accent); background: rgba(255,255,255,0.04); }
    .detail-box .label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--text-faint);
      margin-bottom: 10px;
      font-weight: 800;
    }
    .detail-box .value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ────────── SECTION TITLE ────────── */
    .section-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 15px;
      letter-spacing: -0.02em;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ────────── FOOTER ────────── */
    footer {
      background: rgba(0,0,0,0.2);
      padding: 40px;
      font-size: .75rem;
      color: var(--text-faint);
      letter-spacing: .05em;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    footer strong { color: var(--text-muted); font-weight: 700; }

    /* ────────── SCROLL BAR ────────── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

    /* ────────── ANIMATIONS ────────── */
    @keyframes fadeInUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.6s cubic-bezier(0.2, 0, 0.2, 1) both; }
    .fade-in-1 { animation-delay: .1s; }
    .fade-in-2 { animation-delay: .2s; }
    .fade-in-3 { animation-delay: .3s; }
    .fade-in-4 { animation-delay: .4s; }

    @media (max-width: 768px) {
      .container { padding: 0 20px 40px; }
      .page-hero { padding: 60px 20px 40px; }
      .page-hero h1 { font-size: 2.2rem; }
      nav { padding: 0 20px; }
      .topbar { padding: 10px 20px; display: none; }
      footer { flex-direction: column; gap: 15px; text-align: center; }
    }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <span><span class="dot"></span>UMBB – FS · Département Informatique</span>
    <span>L3 – DSS · 2025/2026</span>
  </div>

  <!-- NAV -->
  <nav>
    <a href="/" class="brand">
      <div class="logo-icon">🚆</div>
      <div>
        RailwayDSS
        <span class="sub">Gestion des voyages</span>
      </div>
    </a>
    <a href="/" id="nav-home" {% if request.path == '/' and not request.args %}class="active"{% endif %}>Accueil</a>
    <a href="/search" id="nav-search" {% if request.path == '/search' %}class="active"{% endif %}>Recherche</a>
    <a href="/statistics" id="nav-stats" {% if request.path == '/statistics' %}class="active"{% endif %}>Statistiques</a>
  </nav>

  {% block content %}{% endblock %}

  <!-- FOOTER -->
  <footer>
    <span>© 2025/2026 · Railway Trip Management · UMBB CS Department</span>
    <span>L3-DSS · Technologie XML</span>
  </footer>

  <script>
    // Subtle row entrance animation
    document.querySelectorAll('tbody tr').forEach((tr, i) => {
      tr.style.animation = `fadeInUp .3s ease ${i * 0.03}s both`;
    });
  </script>
</body>
</html>
